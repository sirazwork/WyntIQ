<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#0a0808"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Large industrial tanks -->
  <rect x="50" y="100" width="80" height="280" fill="#2a1a1a" rx="4"/>
  <rect x="50" y="95" width="80" height="20" fill="#3a2a2a" rx="4"/>
  <rect x="50" y="375" width="80" height="20" fill="#3a2a2a" rx="4"/>
  <rect x="160" y="140" width="80" height="240" fill="#2a1a1a" rx="4"/>
  <rect x="160" y="135" width="80" height="20" fill="#3a2a2a" rx="4"/>
  <!-- Pipes connecting tanks -->
  <rect x="130" y="200" width="30" height="8" fill="#4a3a3a"/>
  <rect x="154" y="185" width="8" height="25" fill="#4a3a3a"/>
  <rect x="240" y="220" width="40" height="8" fill="#4a3a3a"/>
  <rect x="278" y="200" width="8" height="30" fill="#4a3a3a"/>
  <!-- Control panels -->
  <rect x="300" y="200" width="120" height="160" fill="#1a1a2a" rx="4" stroke="#3a3a4a" stroke-width="1"/>
  <rect x="310" y="210" width="100" height="60" fill="#0a0a18" rx="2"/>
  <!-- Screen glow -->
  <rect x="312" y="212" width="96" height="56" fill="rgba(0,150,255,0.15)" rx="1"/>
  <!-- Screen lines/data -->
  <rect x="316" y="218" width="60" height="3" fill="rgba(100,200,255,0.5)" rx="1"/>
  <rect x="316" y="226" width="40" height="3" fill="rgba(100,200,255,0.4)" rx="1"/>
  <rect x="316" y="234" width="70" height="3" fill="rgba(100,200,255,0.5)" rx="1"/>
  <rect x="316" y="242" width="50" height="3" fill="rgba(201,168,76,0.6)" rx="1"/>
  <rect x="316" y="250" width="80" height="3" fill="rgba(100,200,255,0.3)" rx="1"/>
  <!-- Buttons on panel -->
  <circle cx="325" cy="290" r="6" fill="#c9a84c" opacity="0.8"/>
  <circle cx="345" cy="290" r="6" fill="#48bb78" opacity="0.8"/>
  <circle cx="365" cy="290" r="6" fill="#fc8181" opacity="0.8"/>
  <circle cx="385" cy="290" r="6" fill="#4a7aaa" opacity="0.8"/>
  <!-- Engineer silhouette at panel -->
  <circle cx="355" cy="170" r="12" fill="#c9a84c" opacity="0.7"/>
  <rect x="348" y="182" width="14" height="25" fill="#c9a84c" opacity="0.5" rx="3"/>
  <!-- Steam/smoke from tanks -->
  <ellipse cx="90" cy="85" rx="20" ry="15" fill="rgba(255,255,255,0.08)"/>
  <ellipse cx="85" cy="68" rx="15" ry="12" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="200" cy="125" rx="20" ry="15" fill="rgba(255,255,255,0.08)"/>
  <!-- Industrial chimney -->
  <rect x="650" y="50" width="40" height="300" fill="#2a2a2a" rx="2"/>
  <rect x="645" y="45" width="50" height="20" fill="#3a3a3a" rx="2"/>
  <ellipse cx="670" cy="50" rx="30" ry="15" fill="rgba(200,200,200,0.15)"/>
  <ellipse cx="665" cy="35" rx="25" ry="18" fill="rgba(200,200,200,0.1)"/>
  <!-- Conveyor belt -->
  <rect x="450" y="300" width="200" height="12" fill="#2a2a2a" rx="6"/>
  <circle cx="455" cy="306" r="8" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="2"/>
  <circle cx="645" cy="306" r="8" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="2"/>
  <!-- Items on conveyor -->
  <rect x="490" y="293" width="20" height="14" fill="#c9a84c" rx="2" opacity="0.7"/>
  <rect x="530" y="293" width="20" height="14" fill="#c9a84c" rx="2" opacity="0.7"/>
  <rect x="570" y="293" width="20" height="14" fill="#c9a84c" rx="2" opacity="0.7"/>
  <!-- Ambient light sources -->
  <circle cx="400" cy="30" r="3" fill="#ff8800" opacity="0.9"/>
  <line x1="400" y1="33" x2="400" y2="80" stroke="rgba(255,136,0,0.2)" stroke-width="1"/>
  <!-- Floor -->
  <rect x="0" y="400" width="800" height="100" fill="#0a0808"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="20" y="470" font-family="Arial,sans-serif" font-size="11" fill="rgba(201,168,76,0.8)" font-weight="bold" letter-spacing="2">INDUSTRIAL PLANT OPERATIONS</text>
</svg>