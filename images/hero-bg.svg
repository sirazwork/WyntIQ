<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1e3a6e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:rgba(201,168,76,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="60%" r="30%">
      <stop offset="0%" style="stop-color:rgba(30,58,110,0.6)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="600" fill="url(#sky)"/>
  <rect width="1600" height="600" fill="url(#glow1)"/>
  <rect width="1600" height="600" fill="url(#glow2)"/>
  <!-- Grid pattern suggesting data/tech -->
  <g opacity="0.04" stroke="white" stroke-width="1" fill="none">
    <line x1="0" y1="100" x2="1600" y2="100"/>
    <line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="500" x2="1600" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
    <line x1="1200" y1="0" x2="1200" y2="600"/>
    <line x1="1400" y1="0" x2="1400" y2="600"/>
  </g>
  <!-- Aircraft silhouette large -->
  <g opacity="0.15" fill="#c9a84c">
    <ellipse cx="1100" cy="300" rx="400" ry="40"/>
    <ellipse cx="1100" cy="280" rx="100" ry="25"/>
    <polygon points="1200,280 1230,230 1210,280"/>
    <polygon points="1000,280 970,240 990,280"/>
  </g>
  <!-- Warship silhouette -->
  <g opacity="0.1" fill="#e8c56d">
    <polygon points="200,450 600,450 620,480 180,480"/>
    <rect x="280" y="390" width="200" height="60"/>
    <rect x="340" y="350" width="80" height="45"/>
    <rect x="375" y="300" width="6" height="55"/>
  </g>
  <!-- Data nodes suggestion -->
  <circle cx="300" cy="200" r="3" fill="rgba(201,168,76,0.4)"/>
  <circle cx="500" cy="350" r="3" fill="rgba(201,168,76,0.3)"/>
  <circle cx="800" cy="150" r="3" fill="rgba(201,168,76,0.4)"/>
  <circle cx="1200" cy="400" r="3" fill="rgba(201,168,76,0.3)"/>
  <line x1="300" y1="200" x2="500" y2="350" stroke="rgba(201,168,76,0.1)" stroke-width="1"/>
  <line x1="500" y1="350" x2="800" y2="150" stroke="rgba(201,168,76,0.1)" stroke-width="1"/>
  <line x1="800" y1="150" x2="1200" y2="400" stroke="rgba(201,168,76,0.1)" stroke-width="1"/>
</svg>