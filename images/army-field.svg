<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#1a3a1a"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a3a1a"/>
      <stop offset="100%" style="stop-color:#1a2a0a"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Background jungle/forest -->
  <!-- Trees layer 1 - back -->
  <g fill="#0a2a0a" opacity="0.8">
    <polygon points="0,200 40,80 80,200"/>
    <polygon points="60,220 110,60 160,220"/>
    <polygon points="120,210 175,50 230,210"/>
    <polygon points="580,210 635,50 690,210"/>
    <polygon points="640,220 700,60 760,220"/>
    <polygon points="720,200 770,80 820,200"/>
  </g>
  <!-- Trees layer 2 - front -->
  <g fill="#0d3a0d" opacity="0.9">
    <polygon points="0,260 50,120 100,260"/>
    <polygon points="80,270 140,100 200,270"/>
    <polygon points="600,270 660,100 720,270"/>
    <polygon points="680,260 740,120 800,260"/>
  </g>
  <!-- Distant mountains -->
  <polygon points="0,280 150,150 300,240 450,160 600,230 750,155 800,220 800,320 0,320" fill="#1a2a1a" opacity="0.6"/>
  <!-- Ground -->
  <rect x="0" y="360" width="800" height="140" fill="url(#ground)"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="rgba(100,150,50,0.3)" stroke-width="2"/>
  <!-- Military vehicle - truck -->
  <rect x="280" y="310" width="150" height="60" fill="#2a3a1a" rx="4"/>
  <rect x="280" y="295" width="70" height="25" fill="#3a4a2a" rx="3"/>
  <!-- Windshield -->
  <rect x="285" y="298" width="55" height="18" fill="rgba(100,150,200,0.3)" rx="2"/>
  <!-- Wheels -->
  <circle cx="310" cy="373" r="15" fill="#0a0a0a" stroke="#3a3a3a" stroke-width="3"/>
  <circle cx="400" cy="373" r="15" fill="#0a0a0a" stroke="#3a3a3a" stroke-width="3"/>
  <!-- Soldiers -->
  <circle cx="480" cy="330" r="9" fill="#3a4a2a"/>
  <rect x="474" y="339" width="12" height="22" fill="#3a4a2a" rx="2"/>
  <rect x="471" y="342" width="6" height="14" fill="#2a3a1a" rx="1"/>
  <rect x="485" y="342" width="6" height="14" fill="#2a3a1a" rx="1"/>
  <!-- Helmet -->
  <ellipse cx="480" cy="327" rx="10" ry="7" fill="#2a3a1a"/>
  <circle cx="510" cy="335" r="9" fill="#3a4a2a"/>
  <rect x="504" y="344" width="12" height="22" fill="#3a4a2a" rx="2"/>
  <ellipse cx="510" cy="332" rx="10" ry="7" fill="#2a3a1a"/>
  <!-- Rifle suggestion -->
  <line x1="480" y1="342" x2="462" y2="355" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Comm tower in distance -->
  <rect x="390" y="220" width="6" height="100" fill="#4a5a3a" opacity="0.7"/>
  <line x1="393" y1="220" x2="370" y2="255" stroke="#4a5a3a" stroke-width="1.5" opacity="0.7"/>
  <line x1="393" y1="220" x2="416" y2="255" stroke="#4a5a3a" stroke-width="1.5" opacity="0.7"/>
  <!-- Aerial view grid on ground suggesting digital tracking -->
  <rect x="100" y="380" width="200" height="80" fill="none" stroke="rgba(201,168,76,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="200" y1="380" x2="200" y2="460" stroke="rgba(201,168,76,0.1)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="100" y1="420" x2="300" y2="420" stroke="rgba(201,168,76,0.1)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="20" y="480" font-family="Arial,sans-serif" font-size="11" fill="rgba(201,168,76,0.8)" font-weight="bold" letter-spacing="2">INDIAN ARMY — FIELD OPERATIONS</text>
</svg>