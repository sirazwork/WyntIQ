<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#162850"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a6e"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d4a7a"/>
      <stop offset="100%" style="stop-color:#1a3060"/>
    </linearGradient>
    <radialGradient id="light1" cx="30%" cy="0%" r="50%">
      <stop offset="0%" style="stop-color:rgba(201,168,76,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
    <radialGradient id="light2" cx="70%" cy="0%" r="40%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#sky)"/>
  <rect width="800" height="500" fill="url(#light1)"/>
  <rect width="800" height="500" fill="url(#light2)"/>
  <!-- Hangar structure lines -->
  <line x1="0" y1="120" x2="800" y2="120" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="500" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Aircraft body - large military transport silhouette -->
  <ellipse cx="400" cy="260" rx="320" ry="45" fill="url(#wing)" opacity="0.9"/>
  <!-- Fuselage -->
  <ellipse cx="400" cy="240" rx="90" ry="30" fill="#1a3060"/>
  <rect x="310" y="215" width="180" height="50" fill="#1a3060" rx="25"/>
  <!-- Nose -->
  <ellipse cx="490" cy="240" rx="30" ry="20" fill="#152545"/>
  <!-- Tail -->
  <polygon points="310,240 280,200 290,240" fill="#152545"/>
  <polygon points="310,240 285,270 295,240" fill="#152545"/>
  <!-- Engine pods -->
  <ellipse cx="350" cy="275" rx="35" ry="12" fill="#0f2040"/>
  <ellipse cx="450" cy="275" rx="35" ry="12" fill="#0f2040"/>
  <!-- Wing markings -->
  <circle cx="340" cy="255" r="6" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <circle cx="460" cy="255" r="6" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <!-- Ground floor -->
  <rect x="0" y="380" width="800" height="120" fill="url(#floor)"/>
  <line x1="0" y1="380" x2="800" y2="380" stroke="rgba(201,168,76,0.2)" stroke-width="2"/>
  <!-- Floor grid lines -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="100" y1="380" x2="100" y2="500" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="300" y1="380" x2="300" y2="500" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="500" y1="380" x2="500" y2="500" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="700" y1="380" x2="700" y2="500" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Maintenance platform -->
  <rect x="340" y="320" width="20" height="60" fill="#0f2040" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="320" y="315" width="60" height="10" fill="#1a3060"/>
  <!-- Technician silhouette -->
  <circle cx="365" cy="295" r="8" fill="#c9a84c" opacity="0.8"/>
  <rect x="360" y="303" width="10" height="25" fill="#c9a84c" opacity="0.6" rx="2"/>
  <line x1="355" y1="310" x2="365" y2="308" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>
  <line x1="375" y1="310" x2="365" y2="308" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>
  <!-- Overhead lights -->
  <circle cx="200" cy="50" r="4" fill="#fff" opacity="0.9"/>
  <line x1="200" y1="0" x2="200" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="400" cy="40" r="4" fill="#fff" opacity="0.9"/>
  <line x1="400" y1="0" x2="400" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="600" cy="50" r="4" fill="#fff" opacity="0.9"/>
  <line x1="600" y1="0" x2="600" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Light cones -->
  <polygon points="200,54 160,380 240,380" fill="rgba(255,255,200,0.03)"/>
  <polygon points="400,44 360,380 440,380" fill="rgba(255,255,200,0.04)"/>
  <!-- Label -->
  <text x="20" y="470" font-family="Arial,sans-serif" font-size="11" fill="rgba(201,168,76,0.7)" font-weight="bold" letter-spacing="2">IAF MAINTENANCE HANGAR</text>
</svg>