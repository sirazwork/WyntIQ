<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a4a5a"/>
      <stop offset="100%" style="stop-color:#7a6a4a"/>
    </linearGradient>
    <linearGradient id="earth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a4a2a"/>
      <stop offset="100%" style="stop-color:#2a1a0a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Open pit terraces -->
  <ellipse cx="400" cy="350" rx="380" ry="120" fill="#3a2a10"/>
  <ellipse cx="400" cy="370" rx="320" ry="100" fill="#4a3a18"/>
  <ellipse cx="400" cy="390" rx="260" ry="80" fill="#5a4a20"/>
  <ellipse cx="400" cy="405" rx="200" ry="60" fill="#3a2a10"/>
  <ellipse cx="400" cy="415" rx="150" ry="45" fill="#2a1a08"/>
  <!-- Pit walls with terrace lines -->
  <path d="M 20 350 Q 200 280 400 270 Q 600 280 780 350" stroke="rgba(201,168,76,0.3)" stroke-width="2" fill="none"/>
  <path d="M 60 370 Q 220 310 400 300 Q 580 310 740 370" stroke="rgba(201,168,76,0.2)" stroke-width="1.5" fill="none"/>
  <path d="M 100 390 Q 240 340 400 330 Q 560 340 700 390" stroke="rgba(201,168,76,0.15)" stroke-width="1" fill="none"/>
  <!-- Large excavator -->
  <rect x="500" y="300" width="120" height="60" fill="#1a3060" rx="4"/>
  <rect x="510" y="290" width="80" height="20" fill="#162850" rx="2"/>
  <rect x="540" y="270" width="40" height="30" fill="#0f2040" rx="2"/>
  <!-- Excavator arm -->
  <line x1="560" y1="275" x2="620" y2="240" stroke="#1a3060" stroke-width="8" stroke-linecap="round"/>
  <line x1="620" y1="240" x2="650" y2="290" stroke="#1a3060" stroke-width="6" stroke-linecap="round"/>
  <rect x="640" y="285" width="30" height="20" fill="#c9a84c" rx="2" opacity="0.8"/>
  <!-- Excavator tracks -->
  <rect x="495" y="355" width="130" height="15" fill="#0a1628" rx="7"/>
  <!-- Dump truck -->
  <rect x="180" y="330" width="90" height="45" fill="#c9a84c" rx="3" opacity="0.9"/>
  <rect x="175" y="320" width="40" height="25" fill="#b8943c" rx="2"/>
  <!-- Dust clouds -->
  <ellipse cx="580" cy="310" rx="40" ry="20" fill="rgba(180,160,100,0.3)"/>
  <ellipse cx="560" cy="295" rx="30" ry="15" fill="rgba(180,160,100,0.2)"/>
  <!-- Conveyor belt suggestion -->
  <rect x="100" y="340" width="160" height="8" fill="#2a2a2a" rx="4" transform="rotate(-10 100 340)"/>
  <!-- Ground -->
  <rect x="0" y="440" width="800" height="60" fill="url(#earth)"/>
  <text x="20" y="480" font-family="Arial,sans-serif" font-size="11" fill="rgba(201,168,76,0.8)" font-weight="bold" letter-spacing="2">OPEN-CAST MINING OPERATIONS</text>
</svg>