<script>

/* DECISION INSIGHT */
function wyntiqInsight(d){
  if(!d) return "No insight available";

  let r=[];

  if(d.status === "delayed") r.push("Delay caused by approval bottleneck");
  if(d.priority === "high") r.push("High priority escalation");
  if(d.stock !== undefined && d.min !== undefined && d.stock < d.min){
    r.push("Stock shortage triggered demand");
  }

  if(r.length === 0) r.push("Normal workflow execution");

  return r.join(" • ");
}

/* SMART ALERTS */
function wyntiqAlerts(){
  let alerts = [];

  if(window.demands){
    window.demands.forEach(d=>{
      if(d.status === "delayed"){
        alerts.push("⚠️ Demand " + d.id + " delayed");
      }
    });
  }

  if(window.inventory){
    window.inventory.forEach(i=>{
      if(i.stock < i.min){
        alerts.push("📦 Low stock: " + i.name);
      }
    });
  }

  return alerts;
}

/* SECURE AUDIT */
function wyntiqHash(obj){
  let s = JSON.stringify(obj), h = 0;
  for(let i=0;i<s.length;i++){
    h=((h<<5)-h)+s.charCodeAt(i);
    h|=0;
  }
  return h;
}

if(!window.secureLogs) window.secureLogs = [];

function wyntiqSecureLog(action){
  action.hash = wyntiqHash(action);
  window.secureLogs.push(action);
}

/* HOOK INTO EXISTING AUDIT */
if(window.addAudit){
  const oldAudit = window.addAudit;
  window.addAudit = function(a){
    wyntiqSecureLog(a);
    oldAudit(a);
  }
}

</script>
