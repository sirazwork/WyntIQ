<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WYNTIQ App</title>
<style>
body{font-family:Arial;background:#f5f7fa;margin:0}
.nav{background:#1e3a5f;color:#fff;padding:10px}
.card{background:#fff;padding:15px;margin:10px;border-radius:8px}
</style>
</head>

<body>

<div class="nav">WYNTIQ SYSTEM</div>

<div id="app"></div>

<script>

/* =========================
   DEMO DATA
========================= */

let demands = [
  {id:"D001",status:"pending",priority:"high",stock:2,minStock:5},
  {id:"D002",status:"delayed",priority:"low",stock:10,minStock:5}
];

let inventory = [
  {name:"Rotor",stock:2,min:5},
  {name:"Fuel Pump",stock:10,min:5}
];


/* =========================
   1. DECISION INTELLIGENCE
========================= */

function generateDecisionInsight(d){
  let r=[];

  if(d.status==="pending") r.push("Waiting for approval");
  if(d.status==="delayed") r.push("Approval delay detected");
  if(d.priority==="high") r.push("High priority escalation");
  if(d.stock<d.minStock) r.push("Stock shortage");

  if(r.length===0) r.push("Normal workflow");

  return r.join(" • ");
}


/* =========================
   2. SECURE AUDIT (HASH)
========================= */

let secureLogs=[];

function hashAction(a){
  let s=JSON.stringify(a),h=0;
  for(let i=0;i<s.length;i++){
    h=((h<<5)-h)+s.charCodeAt(i);
    h|=0;
  }
  return h;
}

function addAudit(a){
  a.hash=hashAction(a);
  secureLogs.push(a);
}


/* =========================
   3. SMART ALERTS
========================= */

function generateAlerts(){
  let alerts=[];

  demands.forEach(d=>{
    if(d.status==="delayed"){
      alerts.push("⚠️ "+d.id+" delayed");
    }
  });

  inventory.forEach(i=>{
    if(i.stock<i.min){
      alerts.push("📦 Low stock: "+i.name);
    }
  });

  return alerts;
}


/* =========================
   UI RENDER
========================= */

function render(){

  let html="";

  html+="<div class='card'><b>SMART ALERTS</b><br>";
  generateAlerts().forEach(a=>{
    html+=a+"<br>";
  });
  html+="</div>";

  demands.forEach(d=>{
    html+=`
    <div class="card">
      <b>${d.id}</b><br>
      Status: ${d.status}<br>
      <div style="margin-top:10px;background:#eef;padding:8px;border-radius:6px;">
        <b>INSIGHT:</b><br>
        ${generateDecisionInsight(d)}
      </div>
    </div>
    `;
  });

  html+="<div class='card'><b>SECURE AUDIT LOG</b><br>";
  secureLogs.forEach(l=>{
    html+=l.action+" | hash:"+l.hash+"<br>";
  });
  html+="</div>";

  document.getElementById("app").innerHTML=html;
}


/* =========================
   INIT
========================= */

addAudit({action:"System started"});
render();

</script>

</body>
</html>
